<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk — Wanzz Payment</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grid-bg"></div>
<div class="glow-orb one"></div>
<div class="glow-orb two"></div>

<div class="login-wrap">
  <div class="login-card">
    <img src="assets/logo.png" class="login-logo" alt="Wanzz Payment">

    <h1>Selamat Datang</h1>
    <p class="sub">Satu ketukan untuk masuk ke dashboard Wanzz Payment.</p>

    <button class="btn-enter" id="enterBtn">
      <span class="shine"></span>
      Masuk ke Wanzz Payment
    </button>

    <div class="secure-badges">
      <span><i></i> Aman &amp; Terpercaya</span>
      <span><i></i> 24/7 Service</span>
    </div>

    <div class="login-foot">Wanzz Payment · Credit: <b>Wanzz Dev</b></div>
  </div>
</div>

<!-- Loading overlay -->
<div class="loader-overlay" id="loaderOverlay">
  <div class="loader-ring-wrap">
    <div class="loader-ring a"></div>
    <div class="loader-ring b"></div>
    <div class="loader-ring c"></div>
    <div class="loader-logo">
      <img src="assets/logo.png" alt="" style="width:40px;height:40px;border-radius:10px;">
    </div>
  </div>
  <div class="loader-text"><b>Memeriksa koneksi aman…</b></div>
  <div class="loader-bar"><i></i></div>
</div>

<script src="script.js"></script>
<script src="audio.js"></script>
</body>
</html>
